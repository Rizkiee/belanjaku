<!DOCTYPE html>
<html>
<head>
    <title>Toko Eksperimen</title>
    <style>
        body { font-family: Arial; margin: 20px; }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .product {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 5px 10px;
            cursor: pointer;
        }

        .cart {
            margin-top: 40px;
            padding: 20px;
            border-top: 2px solid black;
        }
    </style>
</head>

<body>

<h1>Toko Eksperimen</h1>

<div class="products" id="product-list"></div>

<div class="cart">
    <h2>Keranjang</h2>
    <div id="cart-items"></div>
    <h3>Total: Rp <span id="total-price">0</span></h3>

    <h3>Checkout</h3>
    <input type="text" id="nama" placeholder="Nama"><br><br>
    <input type="text" id="alamat" placeholder="Alamat"><br><br>
    <input type="text" id="nohp" placeholder="No HP"><br><br>

    <button onclick="checkout()">Bayar Sekarang</button>
</div>

<div id="receipt" style="margin-top:30px;"></div>

<script>

let products = [
    { id: 1, name: "Baju", price: 600000, desc: "Baju nyaman dan keren" },
    { id: 2, name: "Celana", price: 800000, desc: "Celana stylish" },
    { id: 3, name: "Aksesoris", price: 200000, desc: "Aksesoris kece" }
];

let cart = {};

function renderProducts() {
    const container = document.getElementById("product-list");
    container.innerHTML = "";

    products.forEach(product => {
        let qty = cart[product.id] ? cart[product.id].qty : 0;

        container.innerHTML += `
            <div class="product">
                <h3>${product.name}</h3>
                <p>${product.desc}</p>
                <p><b>Rp ${product.price}</b></p>

                <div class="qty-control">
                    <button onclick="decreaseQty(${product.id})">-</button>
                    <span>${qty}</span>
                    <button onclick="increaseQty(${product.id})">+</button>
                </div>
            </div>
        `;
    });
}

function increaseQty(id) {
    let product = products.find(p => p.id === id);

    if (!cart[id]) {
        cart[id] = { ...product, qty: 0 };
    }

    cart[id].qty++;
    updateCart();
}

function decreaseQty(id) {
    if (cart[id]) {
        cart[id].qty--;
        if (cart[id].qty <= 0) {
            delete cart[id];
        }
    }
    updateCart();
}

function updateCart() {
    const cartContainer = document.getElementById("cart-items");
    const totalPrice = document.getElementById("total-price");

    cartContainer.innerHTML = "";
    let total = 0;

    Object.values(cart).forEach(item => {
        total += item.price * item.qty;

        cartContainer.innerHTML += `
            <p>${item.name} x ${item.qty} = Rp ${item.price * item.qty}</p>
        `;
    });

    totalPrice.innerText = total;
    renderProducts();
}

function checkout() {
    if (Object.keys(cart).length === 0) {
        alert("Keranjang kosong!");
        return;
    }

    let nama = document.getElementById("nama").value;
    let alamat = document.getElementById("alamat").value;
    let nohp = document.getElementById("nohp").value;

    if (!nama || !alamat || !nohp) {
        alert("Isi semua data dulu ya!");
        return;
    }

    let receiptHTML = `
        <h2>🧾 STRUK PEMBELIAN</h2>
        <p><b>Nama:</b> ${nama}</p>
        <p><b>Alamat:</b> ${alamat}</p>
        <p><b>No HP:</b> ${nohp}</p>
        <hr>
    `;

    let total = 0;

    Object.values(cart).forEach(item => {
        let subtotal = item.price * item.qty;
        total += subtotal;

        receiptHTML += `
            <p>${item.name} x ${item.qty} = Rp ${subtotal}</p>
        `;
    });

    receiptHTML += `
        <hr>
        <h3>Total Bayar: Rp ${total}</h3>
        <p>Terima kasih sudah belanja 😄</p>
    `;

    document.getElementById("receipt").innerHTML = receiptHTML;

    cart = {};
    updateCart();
}

renderProducts();

</script>

</body>
</html>
