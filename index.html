<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Toko Mbah Dukun</title>

<style>
body { font-family: Arial; margin:0; padding:0; background:#e3f2fd; }

header {
    display:flex;
    justify-content:space-between;
    padding:15px;
    background:#2e7d32;
    color:white;
}

.section { display:none; padding:20px; }

.products {
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
    gap:15px;
}

.product {
    background:white;
    border-radius:10px;
    padding:10px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

.product img {
    width:100%;
    height:120px;
    object-fit:cover;
    border-radius:8px;
}

.qty-control {
    display:flex;
    justify-content:center;
    gap:10px;
    margin-top:10px;
}

button {
    padding:5px 10px;
    cursor:pointer;
    border:none;
    border-radius:5px;
}

.cart-icon {
    position:relative;
    cursor:pointer;
}

.cart-count {
    position:absolute;
    top:-8px;
    right:-8px;
    background:red;
    color:white;
    font-size:12px;
    padding:2px 6px;
    border-radius:50%;
}

.cart-item {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:white;
    padding:8px;
    margin-bottom:8px;
    border-radius:8px;
}
</style>
</head>

<body>

<header>
    <h3>Apotek Sehat</h3>
    <div class="cart-icon" onclick="showSection('cartSection')">
        🛒
        <span class="cart-count" id="cartCount">0</span>
    </div>
</header>

<!-- PRODUK -->
<div id="productSection" class="section">
    <h2>Produk</h2>
    <div class="products" id="productList"></div>
</div>

<!-- KERANJANG -->
<div id="cartSection" class="section">
    <h2>Keranjang</h2>
    <div id="cartItems"></div>
    <h3>Total: Rp <span id="totalPrice">0</span></h3>
    <button onclick="showSection('checkoutSection')">Checkout</button>
</div>

<!-- CHECKOUT -->
<div id="checkoutSection" class="section">
    <h2>Data Pembeli</h2>
    <input id="nama" placeholder="Nama"><br><br>
    <input id="alamat" placeholder="Alamat"><br><br>
    <input id="nohp" placeholder="No HP"><br><br>
    <button onclick="processPayment()">Bayar Sekarang</button>
</div>

<!-- INVOICE -->
<div id="invoiceSection" class="section">
    <h2>🧾 Invoice</h2>
    <div id="invoiceContent"></div>
    <button onclick="window.print()">Print</button>
    <button onclick="showSection('productSection')">Kembali ke Toko</button>
</div>

<script>

let products = [
    {id:1,name:"Paracetamol",price:15000,img:"https://via.placeholder.com/150",category:"Demam"},
    {id:2,name:"Cetirizine",price:25000,img:"https://via.placeholder.com/150",category:"Alergi"},
    {id:3,name:"Promaag",price:10000,img:"https://via.placeholder.com/150",category:"Maag"},
    {id:4,name:"Omeprazole",price:20000,img:"https://via.placeholder.com/150",category:"Maag"}
];

let cart = {};

function showSection(sectionId){
    document.querySelectorAll(".section").forEach(sec=>{
        sec.style.display="none";
    });
    document.getElementById(sectionId).style.display="block";
}

function renderProducts(){
    let container = document.getElementById("productList");
    container.innerHTML="";

    products.forEach(p=>{
        let qty = cart[p.id]?.qty || 0;

        container.innerHTML += `
        <div class="product">
            <img src="${p.img}">
            <h4>${p.name}</h4>
            <p>Rp ${p.price}</p>
            <div class="qty-control">
                <button onclick="changeQty(${p.id},-1)">-</button>
                <span>${qty}</span>
                <button onclick="changeQty(${p.id},1)">+</button>
            </div>
        </div>
        `;
    });
}

function changeQty(id,change){
    let product = products.find(p=>p.id===id);

    if(!cart[id]){
        cart[id]={...product,qty:0};
    }

    cart[id].qty += change;

    if(cart[id].qty<=0){
        delete cart[id];
    }

    updateCart();
}

function removeItem(id){
    delete cart[id];
    updateCart();
}

function updateCart(){
    let cartItems = document.getElementById("cartItems");
    let totalPrice = document.getElementById("totalPrice");
    let cartCount = document.getElementById("cartCount");

    cartItems.innerHTML="";
    let total=0;
    let totalItem=0;

    Object.values(cart).forEach(item=>{
        let subtotal=item.price*item.qty;
        total+=subtotal;
        totalItem+=item.qty;

        cartItems.innerHTML+=`
        <div class="cart-item">
            <span>${item.name} x ${item.qty}</span>
            <span>Rp ${subtotal}</span>
            <button onclick="removeItem(${item.id})">X</button>
        </div>
        `;
    });

    totalPrice.innerText=total;
    cartCount.innerText=totalItem;

    renderProducts();
}

function processPayment(){
    let nama=document.getElementById("nama").value;
    let alamat=document.getElementById("alamat").value;
    let nohp=document.getElementById("nohp").value;

    if(!nama||!alamat||!nohp){
        alert("Isi semua data dulu!");
        return;
    }

    let invoice=document.getElementById("invoiceContent");
    let invoiceNumber="INV"+Date.now();

    let html=`
    <p><b>No Invoice:</b> ${invoiceNumber}</p>
    <p><b>Nama:</b> ${nama}</p>
    <p><b>Alamat:</b> ${alamat}</p>
    <p><b>No HP:</b> ${nohp}</p>
    <hr>
    `;

    let total=0;

    Object.values(cart).forEach(item=>{
        let subtotal=item.price*item.qty;
        total+=subtotal;
        html+=`<p>${item.name} x ${item.qty} = Rp ${subtotal}</p>`;
    });

    html+=`<hr><h3>Total Bayar: Rp ${total}</h3>
    <p>Status: Pembayaran Lunas ✅</p>`;

    invoice.innerHTML=html;

    cart={};
    updateCart();
    showSection("invoiceSection");
}

showSection("productSection");
renderProducts();

</script>
</body>
</html>
