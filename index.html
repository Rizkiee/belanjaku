<!DOCTYPE html>
<html>
<head>
    <title>Toko Eksperimen</title>
    <style>
        body {
            font-family: Arial;
            margin: 20px;
        }

        .products {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }

        .product {
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 10px;
        }

        .qty-control {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 10px;
        }

        button {
            padding: 5px 10px;
            cursor: pointer;
        }

        .cart {
            margin-top: 40px;
            padding: 20px;
            border-top: 2px solid black;
        }
    </style>
</head>

<body>

<h1>Toko Eksperimen</h1>

<div class="products" id="product-list"></div>

<div class="cart">
    <h2>Keranjang</h2>
    <div id="cart-items"></div>
    <h3>Total: Rp <span id="total-price">0</span></h3>
    <button onclick="checkout()">Checkout</button>
</div>

<script>

let products = [
    { id: 1, name: "Baju", price: 600000, desc: "Baju nyaman dan keren" },
    { id: 2, name: "Celana", price: 800000, desc: "Celana stylish" },
    { id: 3, name: "Aksesoris", price: 200000, desc: "Aksesoris kece" }
];

let cart = {};

function renderProducts() {
    const container = document.getElementById("product-list");
    container.innerHTML = "";

    products.forEach(product => {
        let qty = cart[product.id] ? cart[product.id].qty : 0;

        container.innerHTML += `
            <div class="product">
                <h3>${product.name}</h3>
                <p>${product.desc}</p>
                <p><b>Rp ${product.price}</b></p>

                <div class="qty-control">
                    <button onclick="decreaseQty(${product.id})">-</button>
                    <span>${qty}</span>
                    <button onclick="increaseQty(${product.id})">+</button>
                </div>
            </div>
        `;
    });
}

function increaseQty(id) {
    let product = products.find(p => p.id === id);

    if (!cart[id]) {
        cart[id] = { ...product, qty: 0 };
    }

    cart[id].qty++;
    updateCart();
}

function decreaseQty(id) {
    if (cart[id]) {
        cart[id].qty--;

        if (cart[id].qty <= 0) {
            delete cart[id];
        }
    }

    updateCart();
}

function updateCart() {
    const cartContainer = document.getElementById("cart-items");
    const totalPrice = document.getElementById("total-price");

    cartContainer.innerHTML = "";
    let total = 0;

    Object.values(cart).forEach(item => {
        total += item.price * item.qty;

        cartContainer.innerHTML += `
            <p>
                ${item.name} x ${item.qty} 
                = Rp ${item.price * item.qty}
            </p>
        `;
    });

    totalPrice.innerText = total;
    renderProducts();
}

function checkout() {
    if (Object.keys(cart).length === 0) {
        alert("Keranjang kosong!");
        return;
    }

    alert("Pembayaran berhasil! Terima kasih 😄");
    cart = {};
    updateCart();
}

renderProducts();

</script>

</body>
</html>  <!-- AKSESORIS -->
  <div class="product aksesoris">
    <h4>Topi</h4>
    <p>Rp80000</p>
    <button onclick="addToCart('Topi',80000)">Tambah</button>
  </div>

  <div class="product aksesoris">
    <h4>Jam Tangan</h4>
    <p>Rp250000</p>
    <button onclick="addToCart('Jam Tangan',250000)">Tambah</button>
  </div>

  <div class="cart-box">
    <h3>Keranjang</h3>
    <p>Total Item: <span id="totalItems">0</span></p>
    <p>Total Harga: Rp <span id="totalPrice">0</span></p>
    <button onclick="goToCheckout()">Checkout</button>
  </div>

</div>

<div class="container hidden" id="checkout">
  <h3>Checkout</h3>
  <input type="text" id="name" placeholder="Nama">
  <input type="text" id="address" placeholder="Alamat">
  <input type="text" id="phone" placeholder="No HP">
  <button onclick="processPayment()">Bayar Sekarang</button>
</div>

<div class="container hidden" id="success">
  <h2>Pembayaran Berhasil 🎉</h2>
  <p>Total Item Dibeli: <span id="finalItems"></span></p>
  <p>Total Pembayaran: Rp <span id="finalPrice"></span></p>
  <p>Terima kasih sudah berpartisipasi.</p>
</div>

<script>

let cart = [];

function addToCart(name, price) {
    cart.push({ name, price });
    updateCart();
}

function removeFromCart(index) {
    cart.splice(index, 1); // hapus 1 barang di posisi itu
    updateCart();
}

function updateCart() {
    const cartItems = document.getElementById("cart-items");
    const totalPrice = document.getElementById("total-price");

    cartItems.innerHTML = "";
    let total = 0;

    cart.forEach((item, index) => {
        total += item.price;

        cartItems.innerHTML += `
            <div style="display:flex; justify-content:space-between; margin:5px 0;">
                <span>${item.name} - Rp ${item.price}</span>
                <button onclick="removeFromCart(${index})">
                    Hapus
                </button>
            </div>
        `;
    });

    totalPrice.innerText = total;
}
</script>

</body>
</html>
